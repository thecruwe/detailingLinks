<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор QR-кода</title>
<style>
  :root {
    --bg: #0a0b14;
    --card: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.1);
    --text: #f4f5fb;
    --muted: #8b8fa8;
    --accent: #6366f1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .wrap { width: 100%; max-width: 420px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  p.lead { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  input[type="url"] {
    width: 100%;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .canvas-wrap {
    display: flex;
    justify-content: center;
    padding: 28px;
    background: #fff;
    border-radius: 18px;
    margin: 24px 0;
  }
  canvas { display: block; max-width: 100%; height: auto; }
  button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -8px var(--accent); }
  button:active { transform: translateY(0); }
  .hint { margin-top: 20px; font-size: 12.5px; color: var(--muted); line-height: 1.6; }
  .hint code { background: var(--card); padding: 2px 6px; border-radius: 5px; color: var(--text); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>QR-код для сайта студии</h1>
    <p class="lead">Введите финальный адрес, где размещена страница (index.html), и скачайте готовый QR-код в формате PNG.</p>

    <label for="url">Адрес сайта (URL)</label>
    <input id="url" type="url" placeholder="https://ваша-студия.ru" value="">

    <div class="canvas-wrap">
      <canvas id="qr" width="320" height="320"></canvas>
    </div>

    <button id="download">⬇ Скачать QR-код (PNG)</button>

    <p class="hint">
      💡 Адрес должен быть финальным и публичным (с <code>https://</code>). QR хранит ровно то, что введено — если позже смените адрес, нужно будет скачать новый QR-код.
    </p>
  </div>

  <script>
  /* =====================================================================
     QR Code Generator — автономная реализация (без внешних библиотек).
     На базе алгоритма Project Nayuki (MIT). Поддерживаются версии 1–40,
     уровень коррекции M. Достаточно для кодирования URL.
     ===================================================================== */
  const QRCodeGen = (function () {
    const ECC = { L: 0, M: 1, Q: 2, H: 3 };
    const ECC_CODEWORDS_PER_BLOCK = [
      [-1,7,10,15,20,26,18,20,24,30,18,20,24,26,30,22,24,28,30,28,28,28,28,30,30,26,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
      [-1,10,16,26,18,24,16,18,22,22,26,30,22,22,24,24,28,28,26,26,26,26,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28],
      [-1,13,22,18,26,18,24,18,22,20,24,28,26,24,20,30,24,28,28,26,30,28,30,30,30,30,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
      [-1,17,28,22,16,22,28,26,26,24,28,24,28,22,24,24,30,28,28,26,28,30,24,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30]
    ];
    const NUM_ERROR_CORRECTION_BLOCKS = [
      [-1,1,1,1,1,1,2,2,2,2,4,4,4,4,4,6,6,6,6,7,8,8,9,9,10,12,12,13,14,15,16,17,18,19,19,20,21,22,24,25],
      [-1,1,1,1,2,2,4,4,4,5,5,5,8,9,9,10,10,11,13,14,16,17,17,18,20,21,23,25,26,28,29,31,33,35,37,38,40,43,45,47,49],
      [-1,1,1,2,2,4,4,6,6,8,8,8,10,12,16,12,17,16,18,21,20,23,23,25,27,29,34,34,35,38,40,43,45,48,51,53,56,59,62,65,68],
      [-1,1,1,2,4,4,4,5,6,8,8,11,11,16,16,18,16,19,21,25,25,25,34,30,32,35,37,40,42,45,48,51,54,57,60,63,66,70,74,77,81]
    ];
    function QrCode(version, errorCorrectionLevel, dataCodewords, mask) {
      this.version = version;
      this.size = version * 4 + 17;
      this.errorCorrectionLevel = errorCorrectionLevel;
      const modules = [];
      const isFunction = [];
      for (let i = 0; i < this.size; i++) {
        const row = [], rowF = [];
        for (let j = 0; j < this.size; j++) { row.push(false); rowF.push(false); }
        modules.push(row); isFunction.push(rowF);
      }
      this.modules = modules;
      this.isFunction = isFunction;
      this.drawFunctionPatterns(mask);
      const allCodewords = this.addEccAndInterleave(dataCodewords);
      this.drawCodewords(allCodewords);
    }
    QrCode.prototype.getModule = function (x, y) {
      return 0 <= x && x < this.size && 0 <= y && y < this.size && this.modules[y][x];
    };
    QrCode.prototype.setModule = function (x, y, v) { this.modules[y][x] = v; };
    QrCode.prototype.drawFunctionPatterns = function (mask) {
      for (let i = 0; i < this.size; i++) {
        this.setFunctionModule(6, i, i % 2 === 0);
        this.setFunctionModule(i, 6, i % 2 === 0);
      }
      this.drawFinderPattern(3, 3);
      this.drawFinderPattern(this.size - 4, 3);
      this.drawFinderPattern(3, this.size - 4);
      const alignPatPos = this.getAlignmentPatternPositions();
      const numAlign = alignPatPos.length;
      for (let i = 0; i < numAlign; i++) {
        for (let j = 0; j < numAlign; j++) {
          if (!(i === 0 && j === 0 || i === 0 && j === numAlign - 1 || i === numAlign - 1 && j === 0))
            this.drawAlignmentPattern(alignPatPos[i], alignPatPos[j]);
        }
      }
      this.drawFormatBits(0, mask);
      this.drawVersion();
    };
    QrCode.prototype.drawFormatBits = function (mask, maskPattern) {
      const data = this.errorCorrectionLevel.formatBits << 3 | maskPattern;
      let rem = data;
      for (let i = 0; i < 10; i++) rem = (rem << 1) ^ ((rem >>> 9) * 0x537);
      const bits = (data << 10 | rem) ^ 0x5412;
      for (let i = 0; i <= 5; i++) this.setFunctionModule(8, i, getBit(bits, i));
      this.setFunctionModule(8, 7, getBit(bits, 6));
      this.setFunctionModule(8, 8, getBit(bits, 7));
      this.setFunctionModule(7, 8, getBit(bits, 8));
      for (let i = 9; i < 15; i++) this.setFunctionModule(14 - i, 8, getBit(bits, i));
      for (let i = 0; i < 8; i++) this.setFunctionModule(this.size - 1 - i, 8, getBit(bits, i));
      for (let i = 8; i < 15; i++) this.setFunctionModule(8, this.size - 15 + i, getBit(bits, i));
      this.setFunctionModule(8, this.size - 8, true);
    };
    QrCode.prototype.drawVersion = function () {
      if (this.version < 7) return;
      let rem = this.version;
      for (let i = 0; i < 12; i++) rem = (rem << 1) ^ ((rem >>> 11) * 0x1F25);
      const bits = this.version << 12 | rem;
      for (let i = 0; i < 18; i++) {
        const bit = getBit(bits, i);
        const a = this.size - 11 + i % 3, b = Math.floor(i / 3);
        this.setFunctionModule(a, b, bit);
        this.setFunctionModule(b, a, bit);
      }
    };
    QrCode.prototype.drawFinderPattern = function (x, y) {
      for (let dy = -4; dy <= 4; dy++) {
        for (let dx = -4; dx <= 4; dx++) {
          const dist = Math.max(Math.abs(dx), Math.abs(dy));
          const xx = x + dx, yy = y + dy;
          if (0 <= xx && xx < this.size && 0 <= yy && yy < this.size)
            this.setFunctionModule(xx, yy, dist !== 2 && dist !== 4);
        }
      }
    };
    QrCode.prototype.drawAlignmentPattern = function (x, y) {
      for (let dy = -2; dy <= 2; dy++)
        for (let dx = -2; dx <= 2; dx++)
          this.setFunctionModule(x + dx, y + dy, Math.max(Math.abs(dx), Math.abs(dy)) !== 1);
    };
    QrCode.prototype.setFunctionModule = function (x, y, isDark) {
      this.modules[y][x] = isDark;
      this.isFunction[y][x] = true;
    };
    QrCode.prototype.addEccAndInterleave = function (data) {
      const ver = this.version;
      const ecl = this.errorCorrectionLevel;
      const numBlocks = NUM_ERROR_CORRECTION_BLOCKS[ecl.ordinal][ver];
      const blockEccLen = ECC_CODEWORDS_PER_BLOCK[ecl.ordinal][ver];
      const rawCodewords = Math.floor(QrCode.getNumRawDataModules(ver) / 8);
      const numShortBlocks = numBlocks - rawCodewords % numBlocks;
      const shortBlockLen = Math.floor(rawCodewords / numBlocks);
      const blocks = [];
      const rsDiv = QrCode.reedSolomonComputeDivisor(blockEccLen);
      for (let i = 0, k = 0; i < numBlocks; i++) {
        const dat = data.slice(k, k + shortBlockLen - blockEccLen + (i < numShortBlocks ? 0 : 1));
        k += dat.length;
        const ecc = QrCode.reedSolomonComputeRemainder(dat, rsDiv);
        if (i < numShortBlocks) dat.push(0);
        blocks.push(dat.concat(ecc));
      }
      const result = [];
      for (let i = 0; i < blocks[0].length; i++) {
        for (let j = 0; j < blocks.length; j++) {
          if (i !== shortBlockLen - blockEccLen || j >= numShortBlocks) result.push(blocks[j][i]);
        }
      }
      return result;
    };
    QrCode.prototype.drawCodewords = function (data) {
      let i = 0;
      for (let right = this.size - 1; right >= 1; right -= 2) {
        if (right === 6) right = 5;
        for (let vert = 0; vert < this.size; vert++) {
          for (let j = 0; j < 2; j++) {
            const x = right - j;
            const upward = ((right + 1) & 2) === 0;
            const y = upward ? this.size - 1 - vert : vert;
            if (!this.isFunction[y][x] && i < data.length * 8) {
              this.modules[y][x] = getBit(data[i >>> 3], 7 - (i & 7));
              i++;
            }
          }
        }
      }
    };
    QrCode.prototype.getAlignmentPatternPositions = function () {
      if (this.version === 1) return [];
      const numAlign = Math.floor(this.version / 7) + 2;
      const step = this.version === 32 ? 26 : Math.ceil((this.version * 4 + 4) / (numAlign * 2 - 2)) * 2;
      const result = [6];
      for (let pos = this.size - 7; result.length < numAlign; pos -= step) result.splice(1, 0, pos);
      return result;
    };
    QrCode.getNumRawDataModules = function (ver) {
      let result = (16 * ver + 128) * ver + 8;
      if (ver < 2) return result;
      const numAlign = Math.floor(ver / 7) + 2;
      result -= (25 * numAlign - 10) * numAlign - 55;
      if (ver >= 7) result -= 36;
      return result;
    };
    QrCode.getNumDataCodewords = function (ver, ecl) {
      return Math.floor(QrCode.getNumRawDataModules(ver) / 8) - ECC_CODEWORDS_PER_BLOCK[ecl.ordinal][ver] * NUM_ERROR_CORRECTION_BLOCKS[ecl.ordinal][ver];
    };
    QrCode.reedSolomonComputeDivisor = function (degree) {
      const result = new Array(degree).fill(0);
      result[degree - 1] = 1;
      let root = 1;
      for (let i = 0; i < degree; i++) {
        for (let j = 0; j < result.length; j++) {
          result[j] = QrCode.reedSolomonMultiply(result[j], root);
          if (j + 1 < result.length) result[j] ^= result[j + 1];
        }
        root = QrCode.reedSolomonMultiply(root, 0x02);
      }
      return result;
    };
    QrCode.reedSolomonComputeRemainder = function (data, divisor) {
      const result = divisor.map(_ => 0);
      for (const b of data) {
        const factor = b ^ result.shift();
        result.push(0);
        for (let i = 0; i < result.length; i++) result[i] ^= QrCode.reedSolomonMultiply(divisor[i], factor);
      }
      return result;
    };
    QrCode.reedSolomonMultiply = function (x, y) {
      let z = 0;
      for (let i = 7; i >= 0; i--) {
        z = (z << 1) ^ ((z >>> 7) * 0x11D);
        z ^= ((y >>> i) & 1) * x;
      }
      return z;
    };
    function getBit(x, i) { return ((x >>> i) & 1) !== 0; }
    const ECC_LEVEL_ORDINAL = [1, 0, 3, 2];
    function QrCodeEcc(level) { this.ordinal = ECC_LEVEL_ORDINAL[level]; this.formatBits = level; }

    function encodeText(text) {
      const ecl = new QrCodeEcc(1);
      const seg = QrSegment.makeSegments(text);
      return QrCode.encodeSegments(seg, ecl);
    }
    QrCode.encodeSegments = function (segs, ecl, minVersion, maxVersion, mask) {
      minVersion = minVersion || 1; maxVersion = maxVersion || 40; mask = mask == null ? -1 : mask;
      let version, dataUsedBits;
      for (version = minVersion; ; version++) {
        const dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8;
        const usedBits = QrSegment.getTotalBits(segs, version);
        if (usedBits <= dataCapacityBits) { dataUsedBits = usedBits; break; }
        if (version >= maxVersion) throw new Error("Данные слишком длинные для QR-кода");
      }
      const bb = [];
      for (const seg of segs) {
        appendBits(seg.mode, 4, bb);
        appendBits(seg.numChars, seg.mode === 3 ? 8 : seg.charCountBits(version), bb);
        for (const b of seg.data) appendBits(b, 8, bb);
      }
      const dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8;
      appendBits(0, Math.min(4, dataCapacityBits - dataUsedBits), bb);
      appendBits(0, (8 - bb.length % 8) % 8, bb);
      for (let padByte = 0xEC; bb.length < dataCapacityBits; padByte ^= 0xEC ^ 0x11) appendBits(padByte, 8, bb);
      const dataCodewords = arrayToByteArray(bb);
      const m = mask === -1 ? 0 : mask;
      return new QrCode(version, ecl, dataCodewords, m);
    };
    function appendBits(val, len, bb) {
      for (let i = len - 1; i >= 0; i--) bb.push(((val >>> i) & 1));
    }
    function arrayToByteArray(bitArray) {
      const out = [];
      for (let i = 0; i < bitArray.length; i += 8) {
        let b = 0;
        for (let j = 0; j < 8 && i + j < bitArray.length; j++) b = (b << 1) | bitArray[i + j];
        b <<= 8 - Math.min(8, bitArray.length - i);
        out.push(b);
      }
      return out;
    }
    function QrSegment(mode, numChars, bitData) {
      this.mode = mode; this.numChars = numChars; this.data = bitData;
    }
    QrSegment.prototype.charCountBits = function (ver) {
      return [10,12,14][Math.floor((ver + 7) / 17)] || 0;
    };
    QrSegment.getTotalBits = function (segs, ver) {
      let result = 0;
      for (const seg of segs) {
        const ccBits = seg.charCountBits(ver);
        result += 4 + ccBits + seg.data.length * 8;
      }
      return result;
    };
    QrSegment.makeSegments = function (text) {
      if (text === "") return [];
      if (isNumeric(text)) return [QrSegment.makeNumeric(text)];
      if (isAlphanumeric(text)) return [QrSegment.makeAlphanumeric(text)];
      return [QrSegment.makeBytes(toUtf8ByteArray(text))];
    };
    QrSegment.makeBytes = function (data) {
      const bb = [];
      for (const b of data) appendBits(b, 8, bb);
      return new QrSegment(4, data.length, bb);
    };
    QrSegment.makeNumeric = function (digits) {
      const bb = [];
      for (let i = 0; i < digits.length;) {
        const n = Math.min(digits.length - i, 3);
        const num = parseInt(digits.substr(i, n), 10);
        appendBits(num, n * 3 + 1, bb);
        i += n;
      }
      return new QrSegment(1, digits.length, bb);
    };
    QrSegment.makeAlphanumeric = function (text) {
      const bb = [];
      let i;
      for (i = 0; i + 2 <= text.length; i += 2) {
        const val = ALPHANUMERIC.indexOf(text.charAt(i)) * 45 + ALPHANUMERIC.indexOf(text.charAt(i + 1));
        appendBits(val, 11, bb);
      }
      if (i < text.length) appendBits(ALPHANUMERIC.indexOf(text.charAt(i)), 6, bb);
      return new QrSegment(2, text.length, bb);
    };
    const ALPHANUMERIC = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:";
    function isNumeric(s) { return /^[0-9]*$/.test(s); }
    function isAlphanumeric(s) { return /^[0-9A-Z $%*+\-./:]*$/.test(s); }
    function toUtf8ByteArray(str) {
      str = encodeURI(str);
      const out = [];
      for (let i = 0; i < str.length; i++) {
        if (str.charAt(i) !== "%") out.push(str.charCodeAt(i) & 0xFF);
        else {
          out.push(parseInt(str.substr(i + 1, 2), 16));
          i += 2;
        }
      }
      return out;
    }
    return { encode: function (text) { const qr = encodeText(text); return qr; }, QrCode };
  })();

  /* =================== Отрисовка и взаимодействие =================== */
  const canvas = document.getElementById('qr');
  const ctx = canvas.getContext('2d');
  const urlInput = document.getElementById('url');
  const dlBtn = document.getElementById('download');

  function drawQR(text) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (!text) return;
    try {
      const qr = QRCodeGen.encode(text);
      const count = qr.size;
      const size = canvas.width;
      const margin = 16;
      const cell = (size - margin * 2) / count;
      ctx.fillStyle = '#0a0b14';
      for (let r = 0; r < count; r++) {
        for (let c = 0; c < count; c++) {
          if (qr.getModule(c, r)) {
            ctx.fillRect(margin + c * cell, margin + r * cell, Math.ceil(cell), Math.ceil(cell));
          }
        }
      }
    } catch (e) {
      alert('Ошибка генерации QR: ' + e.message);
    }
  }

  urlInput.addEventListener('input', () => drawQR(urlInput.value.trim()));

  dlBtn.addEventListener('click', () => {
    if (!urlInput.value.trim()) { alert('Сначала введите адрес сайта.'); return; }
    const link = document.createElement('a');
    link.download = 'qr-code.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  drawQR(urlInput.value.trim());
  </script>
</body>
</html>
